name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    name: MIDI/CV firmware (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software/midi-cv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: software/midi-cv/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest --cov=sam17 --cov-report=term-missing

  docs:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check.json'
